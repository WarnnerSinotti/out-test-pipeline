name: Pipeline Completo

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      k6_profile:
        description: "Perfil de teste K6"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - load
          - spike
          - soak
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REPO_ORG: ${{ github.repository_owner }}
  K6_PROFILE: ${{ github.event.inputs.k6_profile || 'smoke' }}

jobs:
  playwright-api:
    name: API (Playwright)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_ORG }}/out-e2e-playwright
          path: playwright

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Instalar dependências Playwright
        working-directory: playwright
        run: npm ci || npm install

      - name: Instalar navegadores Playwright
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Rodar testes de API
        working-directory: playwright
        run: npm run playwright:api
        env:
          API_POSTS_BASE_URL: ${{ secrets.API_POSTS_BASE_URL || 'https://jsonplaceholder.typicode.com' }}

      - name: Upload relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report
          path: playwright/playwright-report/
          retention-days: 14
          if-no-files-found: warn

  playwright-e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-22.04
    needs: playwright-api

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_ORG }}/out-e2e-playwright
          path: playwright

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Instalar dependências Playwright
        working-directory: playwright
        run: npm ci || npm install

      - name: Instalar navegadores Playwright
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Rodar testes E2E
        working-directory: playwright
        run: npm run playwright:e2e
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://the-internet.herokuapp.com' }}
          USUARIO: ${{ secrets.USUARIO || 'tomsmith' }}
          SENHA: ${{ secrets.SENHA || 'SuperSecretPassword!' }}

      - name: Upload relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: playwright/playwright-report/
          retention-days: 14
          if-no-files-found: warn

  k6:
    name: Performance (K6)
    runs-on: ubuntu-22.04
    needs: playwright-e2e

    env:
      BASE_URL_TEST: ${{ secrets.BASE_URL_TEST || 'https://jsonplaceholder.typicode.com' }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_ORG }}/out-performance-k6
          path: k6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: k6/package-lock.json

      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Instalar dependências e rodar K6
        working-directory: k6
        run: |
          npm ci || npm install
          npx cross-env K6_TEST_TYPE=${{ env.K6_PROFILE }} npm run test:k6

      - name: Upload relatório K6
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: k6/src/reports/
          retention-days: 14
          if-no-files-found: warn

  wdio-mobile:
    name: Mobile (WebDriverIO)
    runs-on: ubuntu-latest
    needs: k6

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_ORG }}/out-mobile-tests
          path: mobile

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Instalar dependências
        working-directory: mobile
        run: npm ci || npm install

      - name: Baixar APK (opcional)
        env:
          APK_URL: ${{ secrets.APK_URL }}
        run: |
          if [ -n "$APK_URL" ]; then
            mkdir -p android
            curl -L -o android/app.apk "$APK_URL"
          fi
        working-directory: mobile

      - name: Verificar APK
        working-directory: mobile
        run: |
          if [ ! -f android/app.apk ]; then
            echo "::error::APK não encontrado. Adicione android/app.apk ao repositório out-mobile-tests ou configure o secret APK_URL."
            exit 1
          fi

      - name: Rodar emulador e testes mobile
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_7_pro
          working-directory: mobile
          script: npm run test:mobile
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
        env:
          ANDROID_PLATFORM_VERSION: "14"

      - name: Gerar relatório Allure
        if: always()
        working-directory: mobile
        run: |
          npx allure generate allure-results --clean -o allure-report || echo "Sem resultados para gerar relatório"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mobile
          path: mobile/allure-results/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload relatório Allure (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-mobile
          path: mobile/allure-report/
          retention-days: 14
          if-no-files-found: warn
