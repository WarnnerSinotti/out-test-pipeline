name: Pipeline Completo

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REPO_ORG: ${{ github.repository_owner }}

jobs:
  playwright-api:
    name: API (Playwright)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_ORG }}/out-e2e-playwright
          path: playwright

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Instalar dependências Playwright
        working-directory: playwright
        run: npm ci || npm install

      - name: Instalar navegadores Playwright
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Rodar testes de API
        working-directory: playwright
        run: npm run playwright:api
        env:
          API_POSTS_BASE_URL: ${{ secrets.API_POSTS_BASE_URL || 'https://jsonplaceholder.typicode.com' }}

      - name: Upload relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report
          path: playwright/playwright-report/
          retention-days: 14
          if-no-files-found: warn

  playwright-e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-22.04
    needs: playwright-api

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_ORG }}/out-e2e-playwright
          path: playwright

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Instalar dependências Playwright
        working-directory: playwright
        run: npm ci || npm install

      - name: Instalar navegadores Playwright
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Rodar testes E2E
        working-directory: playwright
        run: npm run playwright:e2e
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://the-internet.herokuapp.com' }}
          USUARIO: ${{ secrets.USUARIO || 'tomsmith' }}
          SENHA: ${{ secrets.SENHA || 'SuperSecretPassword!' }}

      - name: Upload relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: playwright/playwright-report/
          retention-days: 14
          if-no-files-found: warn

  k6:
    name: Performance (K6)
    runs-on: ubuntu-22.04
    needs: playwright-e2e

    env:
      BASE_URL_TEST: ${{ secrets.BASE_URL_TEST || 'https://jsonplaceholder.typicode.com' }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_ORG }}/out-performance-k6
          path: k6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: k6/package-lock.json

      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Instalar dependências e rodar K6
        working-directory: k6
        run: |
          npm ci || npm install
          npm run test-smoke

      - name: Upload relatório K6
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: k6/src/reports/
          retention-days: 14
          if-no-files-found: warn
